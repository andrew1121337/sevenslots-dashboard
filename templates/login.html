<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SevenSlots — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0010;
  --bg2: #110820;
  --bg3: #1a0e2e;
  --purple: #9333ea;
  --purple2: #a855f7;
  --purple-dim: rgba(147,51,234,0.18);
  --purple-glow: rgba(147,51,234,0.45);
  --border: rgba(147,51,234,0.2);
  --border2: rgba(147,51,234,0.4);
  --text: #ffffff;
  --text2: #d1c8f0;
  --dim: #7c6fa0;
  --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content:'';
  position: fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(147,51,234,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(6,182,212,0.08) 0%, transparent 70%);
}
.login-box {
  position: relative; z-index:1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  margin: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.login-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 32px;
}
.login-badge {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), #7c22d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: #fff;
  box-shadow: 0 0 24px var(--purple-glow);
}
.login-title {
  font-size: 24px; font-weight: 900;
}
.login-title span { color: var(--purple2); }
.field {
  margin-bottom: 16px;
}
.field label {
  display: block;
  font-size: 10px; font-weight: 800;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 600;
  padding: 12px 14px;
  border-radius: 10px;
  outline: none;
  transition: .15s;
}
.field input:focus {
  border-color: var(--purple2);
  box-shadow: 0 0 0 3px rgba(147,51,234,0.15);
}
.login-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, var(--purple), #7c22d4);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 15px; font-weight: 800;
  letter-spacing: 1px;
  cursor: pointer;
  transition: .2s;
  margin-top: 8px;
}
.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--purple-glow);
}
.err {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--red);
  font-size: 12px; font-weight: 700;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="login-badge">7S</div>
    <div class="login-title">Seven<span>Slots</span></div>
  </div>
  {% if error %}
  <div class="err">Username sau parola incorecta</div>
  {% endif %}
  <form method="POST" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Parola</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn">Intra in Dashboard</button>
  </form>
</div>
</body>
</html>
